services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: weparty-backend
    environment:
      - PORT=4000
      - AUTH_SECRET=${AUTH_SECRET}
      - INVITE_SECRET=${INVITE_SECRET}
      - DATABASE_URL=postgres://weparty:weparty@postgres:5432/weparty
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  postgres:
    image: postgres:16-alpine
    container_name: weparty-postgres
    environment:
      - POSTGRES_DB=weparty
      - POSTGRES_USER=weparty
      - POSTGRES_PASSWORD=weparty
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: weparty-redis
    ports:
      - "6379:6379"

  coturn:
    image: instrumentisto/coturn
    container_name: weparty-coturn
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --realm=weparty.local
      - --fingerprint
      - --user=${TURN_USERNAME}:${TURN_PASSWORD}
      - --listening-port=3478
    ports:
      - "3478:3478"
      - "3478:3478/udp"

volumes:
  pg_data:
